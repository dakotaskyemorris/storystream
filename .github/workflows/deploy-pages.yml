name: Deploy StoryStream

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create redirect to live site
        run: |
          mkdir -p out
          cat > out/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <meta name="robots" content="noindex">
              <link rel="canonical" href="https://storystream-five.vercel.app/">
              <meta http-equiv="refresh" content="0; url=https://storystream-five.vercel.app/">
              <title>StoryStream</title>
              <script>
                const path = window.location.pathname.replace(/^\/storystream\/?/, "/");
                window.location.replace(`https://storystream-five.vercel.app${path}${window.location.search}${window.location.hash}`);
              </script>
            </head>
            <body>
              <p><a href="https://storystream-five.vercel.app/">StoryStream</a></p>
            </body>
          </html>
          HTML
          cp out/index.html out/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
